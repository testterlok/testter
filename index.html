<!DOCTYPE html>

<title>CMS Test</title>

<style>

    font-family: Arial;
    background:#0f172a;

.container {
    max-width:900px;

}
button {
    padding:12px;
    margin:6px;

}

    width:100%;

}

}
.wrong {color:red;}
.correct {color:lightgreen;}

</head>

<h1>CMS TEST</h1>

    <button onclick="startRange(0,50)">1–50</button>

    <button onclick="randomTest()">🎲 Random 30</button>
